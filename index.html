<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <!-- font awesome -->
    <link rel="stylesheet" href="css/all.min.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- normalise -->
    <link rel="stylesheet" href="css/normalise.css" />
    <!-- main -->
    <link rel="stylesheet" href="css/main.css" />

    <title>Frontend Mentor | Interactive comments section</title>
  </head>
  <body>
    <!-- Pull dynamic content from the data.json file -->
    <div class="container">
      <div class="cont">
        <div class="rate">
          <i class="fa-solid fa-angle-up"></i>
          <div class="rate-value">12</div>
          <i class="fa-solid fa-angle-down"></i>
        </div>
        <div class="content">
          <div class="title">
            <div class="left">
              <img src="images/avatars/image-amyrobson.png" class="avatar" />
              <span class="name">amyrobson</span>
              <span class="date">1 month ago</span>
            </div>
            <div class="right">
              <span class="button reply">
                <img src="images/icon-reply.svg" /> reply
              </span>
              <!-- <span class="button delete">
                <img src="images/icon-delete.svg" /> delete
              </span>
              <span class="button edit">
                <img src="images/icon-edit.svg" /> edit
              </span> -->
            </div>
          </div>
          <p>
            Impressive! Though it seems the drag feature could be improved. But
            overall it looks incredible. You've nailed the design and the
            responsiveness at various breakpoints works really well.
          </p>
        </div>
      </div>
      <!-- <div class="replys">
        <div class="replys-cont"></div>
      </div> -->
      <div class="add send">
        <img src="images/avatars/image-amyrobson.png" alt="" class="logo" />
        <textarea
          name="add"
          id="#add"
          placeholder="Add a comment..."
        ></textarea>
        <a href="#" class="button">send</a>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
